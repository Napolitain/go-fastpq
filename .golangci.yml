version: "2"

run:
  tests: true
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true
    govet:
      check-shadowing: true
    revive:
      config: .revive.toml
  exclusions:
    generated: lax
    warn-unused: true
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
