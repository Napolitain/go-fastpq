version: "2"

run:
  tests: true
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    errcheck:
      check-blank: true
      check-type-assertions: true
    govet:
      enable:
        - shadow
    revive:
      severity: warning
      confidence: 0.8
      rules:
        - name: error-strings
        - name: receiver-naming
        - name: time-naming
        - name: var-naming
          arguments:
            -
              - API
              - CI
              - FIFO
              - HTTP
              - HTTPS
              - ID
              - JSON
              - URL
            - []
            -
              - upper-case-const: true
  exclusions:
    generated: lax
    warn-unused: true
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
